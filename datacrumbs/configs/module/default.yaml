name: default
install_dir: build
mode: trace
file: trace.pfw
user:
  - name: app
    link: /opt/ior/install/bin/ior
    regex: .*
  # - name: app2
  #   link: /home/cc/datacrumbs/build/tests/df_tracer_test
  #   regex: .*
  # - name: app3
  #   link: /opt/ior/install/bin/ior
  #   regex: .*
  - name: mpi
    link: /opt/spack/opt/spack/linux-haswell/openmpi-5.0.5-cyoqcxwnzhatvkl44v6axpcamm7clo25/lib/libmpi.so
    regex: ^PMPI.*
  - name: hdf5
    link: /opt/spack/opt/spack/linux-haswell/hdf5-1.14.5-uue4mohmum6xuuze52b45sqpwcwikccb/lib/libhdf5.so
    regex: ^H5.*

profile:
  interval_sec: 0.0001

trace:
  args: 1
  type: ring_buffer # ring_buffer