name: lead2
install_dir: /home/haridev/datacrumbs/install
mode: tracer
trace_file_path: /scratch/haridev/logs/lead2-trace.pfw
capture_probes:
  - name: custom1
    start_event_id: 100000
    probe: custom
    type: custom
    file: /home/haridev/datacrumbs/etc/datacrumbs/plugins/custom_probes/sys_io/sysio.bpf.c
    probes: /home/haridev/datacrumbs/etc/datacrumbs/plugins/custom_probes/sys_io/probes.json
    process_header: /home/haridev/datacrumbs/etc/datacrumbs/plugins/custom_probes/sys_io/sysio_process.h
    event_type: 2
  - name: sys
    probe: syscalls
    type: header
    file: /usr/src/kernels/5.14.0-570.18.1.1toss.t5.x86_64/include/linux/syscalls.h
    regex: sys_.*
  - name: libc
    probe: uprobe
    type: binary
    file: /usr/lib64/libc.so.6
    regex: ^(?!.*_dl_)(?!.*_rtld_)(?!__).*
  - name: bio
    probe: kprobe
    type: ksym
    regex: bio.*
  - name: python
    probe: usdt
    type: usdt
    binary_path: /lib64/libpython3.9.so.1.0
    provider: python  
profiling_interval: 0.0001