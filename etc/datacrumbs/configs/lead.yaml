capture_probes:
  - name: custom1
    start_event_id: 100000
    probe: custom
    type: custom
    file: @DATACRUMBS_PROJECT_PATH@/etc/datacrumbs/plugins/custom_probes/sys_io/sysio.bpf.c
    probes: @DATACRUMBS_PROJECT_PATH@/etc/datacrumbs/plugins/custom_probes/sys_io/probes.json
    process_header: @DATACRUMBS_PROJECT_PATH@/etc/datacrumbs/plugins/custom_probes/sys_io/sysio_process.h
    event_type: 2
  - name: sys
    probe: syscalls
    type: header
    file: /usr/src/kernels/@DATACRUMBS_UNAME_R@/include/linux/syscalls.h
    regex: sys_.*
  - name: libc
    probe: uprobe
    type: binary
    file: @DATACRUMBS_LIBC_SO@
    regex: .*fork.*
  - name: bio
    probe: kprobe
    type: ksym
    regex: bio.*
  - name: python
    probe: usdt
    type: usdt
    binary_path: /usr/lib64/libpython3.9.so
    provider: python
  - name: os_page_cache
    probe: kprobe
    type: header
    file: /usr/src/kernels/@DATACRUMBS_UNAME_R@/include/linux/pagemap.h
  - name: shm
    probe: kprobe
    type: header
    file: /usr/src/kernels/@DATACRUMBS_UNAME_R@/include/linux/shmem_fs.h
  - name: fscache
    probe: kprobe
    type: header
    file: /usr/src/kernels/@DATACRUMBS_UNAME_R@/include/linux/fscache.h
  - name: xfs
    probe: kprobe
    type: ksym
    regex: ^xfs(?!.*cold).*
  - name: ext4
    probe: kprobe
    type: ksym
    regex: ^ext4(?!.*cold).*
  - name: iomap
    probe: kprobe
    type: ksym
    regex: ^iomap(?!.*cold).*
  - name: ior
    probe: uprobe
    type: binary
    file: /home/haridev/spack/opt/spack/linux-haswell/ior-3.3.0-ip47j26fw7xxfftdzjvy2h36phgcuypv/bin/ior